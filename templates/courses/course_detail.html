<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

{% if not is_enrolled %}
    <a href="/courses/enroll/{{ course.id }}/">Enroll Now</a>
{% else %}
    <p style="color:green;">✅ You are enrolled</p>

    <h3>Modules</h3>
    <ul>
        {% for module in modules %}
            <li>
                {{ module.title }}
                <a href="/courses/module/{{ module.id }}/">Start</a>
            </li>
        {% endfor %}
    </ul>
{% endif %}
