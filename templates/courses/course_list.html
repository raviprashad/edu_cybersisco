<h2>Available Courses</h2>

{% for course in courses %}
    <div style="border:1px solid #ccc; padding:15px; margin:10px;">
        <h3>{{ course.title }}</h3>
        <p>{{ course.description }}</p>

        <a href="/courses/{{ course.id }}/">View Course</a>
    </div>
{% empty %}
    <p>No courses available</p>
{% endfor %}
