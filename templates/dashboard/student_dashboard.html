<h2>My Learning Dashboard</h2>

<!-- 🔹 Navigation Buttons -->
<div style="margin-bottom:20px;">
    <a href="/courses/" style="margin-right:10px;">📚 All Courses</a>
    <a href="/courses/enrolled/" style="margin-right:10px;">🎓 My Courses</a>
    <a href="/auth/logout/">🚪 Logout</a>
</div>

<hr>

<!-- 🔹 Enrolled Courses Progress -->
<h3>My Enrolled Courses</h3>

{% for item in data %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h4>{{ item.course.title }}</h4>

        <p>Progress: {{ item.progress|floatformat:2 }}%</p>

        <div style="background:#ddd; width:100%; height:20px;">
            <div style="background:green; width:{{ item.progress }}%; height:20px;"></div>
        </div>

        <br>
        <a href="/courses/{{ item.course.id }}/">Continue</a>
    </div>
{% empty %}
    <p>You have not enrolled in any courses yet.</p>
{% endfor %}
